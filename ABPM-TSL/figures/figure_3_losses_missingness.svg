<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460" role="img" aria-label="Training losses and missingness">
  <rect width="980" height="460" fill="#f8fafc"/>
  <text x="490" y="42" text-anchor="middle" font-family="Inter, Arial" font-size="25" font-weight="700" fill="#0f172a">Losses and Missingness-Aware Training</text>
  <rect x="80" y="95" width="220" height="95" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="190" y="128" text-anchor="middle" font-family="Inter, Arial" font-size="16" font-weight="700" fill="#1e3a8a">Masked ABPM</text>
  <text x="190" y="153" text-anchor="middle" font-family="Inter, Arial" font-size="12" fill="#1e40af">random missing segments</text>
  <rect x="380" y="95" width="220" height="95" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="490" y="128" text-anchor="middle" font-family="Inter, Arial" font-size="16" font-weight="700" fill="#166534">Teacher Loss</text>
  <text x="490" y="153" text-anchor="middle" font-family="Inter, Arial" font-size="12" fill="#166534">reconstruction + labels</text>
  <rect x="680" y="95" width="220" height="95" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="790" y="128" text-anchor="middle" font-family="Inter, Arial" font-size="16" font-weight="700" fill="#92400e">Teacher Signal</text>
  <text x="790" y="153" text-anchor="middle" font-family="Inter, Arial" font-size="12" fill="#92400e">soft outputs + embedding</text>
  <rect x="80" y="270" width="220" height="95" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="190" y="303" text-anchor="middle" font-family="Inter, Arial" font-size="16" font-weight="700" fill="#5b21b6">Feature Dropout</text>
  <text x="190" y="328" text-anchor="middle" font-family="Inter, Arial" font-size="12" fill="#5b21b6">simulate missing fields</text>
  <rect x="380" y="270" width="220" height="95" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="490" y="303" text-anchor="middle" font-family="Inter, Arial" font-size="16" font-weight="700" fill="#075985">Student Loss</text>
  <text x="490" y="328" text-anchor="middle" font-family="Inter, Arial" font-size="12" fill="#075985">labels + distillation + embed</text>
  <rect x="680" y="270" width="220" height="95" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="790" y="303" text-anchor="middle" font-family="Inter, Arial" font-size="16" font-weight="700" fill="#991b1b">Robust Output</text>
  <text x="790" y="328" text-anchor="middle" font-family="Inter, Arial" font-size="12" fill="#991b1b">risk + confidence</text>
  <path d="M300 143 H380" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M600 143 H680" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M300 318 H380" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M600 318 H680" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M790 190 C745 230 675 260 590 296" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#arrowOrange)"/>
  <text x="628" y="244" font-family="Inter, Arial" font-size="13" fill="#92400e">distillation</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d97706"/>
    </marker>
  </defs>
</svg>
