<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-label="ABPM-TSL framework">
  <rect width="980" height="520" fill="#f8fafc"/>
  <text x="490" y="42" text-anchor="middle" font-family="Inter, Arial" font-size="26" font-weight="700" fill="#0f172a">ABPM-TSL Framework</text>
  <rect x="70" y="95" width="250" height="120" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="195" y="128" text-anchor="middle" font-family="Inter, Arial" font-size="17" font-weight="700" fill="#1e3a8a">Full ABPM View</text>
  <text x="195" y="158" text-anchor="middle" font-family="Inter, Arial" font-size="13" fill="#1e40af">24-hour SBP, DBP, HR</text>
  <text x="195" y="181" text-anchor="middle" font-family="Inter, Arial" font-size="13" fill="#1e40af">sleep/wake and time features</text>
  <rect x="395" y="95" width="230" height="120" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="510" y="130" text-anchor="middle" font-family="Inter, Arial" font-size="17" font-weight="700" fill="#166534">Teacher Model</text>
  <text x="510" y="160" text-anchor="middle" font-family="Inter, Arial" font-size="13" fill="#166534">CNN + Transformer</text>
  <text x="510" y="183" text-anchor="middle" font-family="Inter, Arial" font-size="13" fill="#166534">ABPM embedding</text>
  <rect x="710" y="95" width="210" height="120" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="815" y="128" text-anchor="middle" font-family="Inter, Arial" font-size="17" font-weight="700" fill="#92400e">Teacher Outputs</text>
  <text x="815" y="158" text-anchor="middle" font-family="Inter, Arial" font-size="13" fill="#92400e">soft probabilities</text>
  <text x="815" y="181" text-anchor="middle" font-family="Inter, Arial" font-size="13" fill="#92400e">hidden representation</text>
  <rect x="70" y="305" width="250" height="120" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="195" y="338" text-anchor="middle" font-family="Inter, Arial" font-size="17" font-weight="700" fill="#5b21b6">Limited Inputs</text>
  <text x="195" y="368" text-anchor="middle" font-family="Inter, Arial" font-size="13" fill="#5b21b6">clinic/home BP, metadata</text>
  <text x="195" y="391" text-anchor="middle" font-family="Inter, Arial" font-size="13" fill="#5b21b6">missingness masks</text>
  <rect x="395" y="305" width="230" height="120" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="510" y="338" text-anchor="middle" font-family="Inter, Arial" font-size="17" font-weight="700" fill="#075985">Student Model</text>
  <text x="510" y="368" text-anchor="middle" font-family="Inter, Arial" font-size="13" fill="#075985">missingness-aware MLP</text>
  <text x="510" y="391" text-anchor="middle" font-family="Inter, Arial" font-size="13" fill="#075985">or TabTransformer</text>
  <rect x="710" y="305" width="210" height="120" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="815" y="338" text-anchor="middle" font-family="Inter, Arial" font-size="17" font-weight="700" fill="#991b1b">Deployment</text>
  <text x="815" y="368" text-anchor="middle" font-family="Inter, Arial" font-size="13" fill="#991b1b">ABPM risk estimate</text>
  <text x="815" y="391" text-anchor="middle" font-family="Inter, Arial" font-size="13" fill="#991b1b">prioritisation only</text>
  <path d="M320 155 H395" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M625 155 H710" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M320 365 H395" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M625 365 H710" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M815 215 C760 260 645 290 580 315" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#arrowOrange)"/>
  <text x="720" y="268" font-family="Inter, Arial" font-size="13" fill="#92400e">distillation</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d97706"/>
    </marker>
  </defs>
</svg>
