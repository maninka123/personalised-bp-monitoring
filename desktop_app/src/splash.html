<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex; align-items: center; justify-content: center;
  width: 520px; height: 380px; overflow: hidden;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: transparent; -webkit-app-region: drag;
}
.splash {
  width: 480px; height: 340px;
  background: linear-gradient(135deg, #0f2439 0%, #1a3a5c 40%, #1e6f8f 100%);
  border-radius: 22px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  animation: fadeIn 0.6s ease-out;
}
.splash::before {
  content: ''; position: absolute; inset: 0; border-radius: 22px;
  background: radial-gradient(ellipse at 30% 20%, rgba(45,140,240,0.15) 0%, transparent 60%);
}
@keyframes fadeIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

/* Heart + pulse icon */
.icon-wrap { position: relative; width: 90px; height: 90px; margin-bottom: 18px; }
.heart-ring {
  width: 90px; height: 90px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  animation: pulse-ring 2s ease-in-out infinite;
}
@keyframes pulse-ring {
  0%, 100% { transform: scale(1); border-color: rgba(255,255,255,0.15); }
  50% { transform: scale(1.06); border-color: rgba(45,200,140,0.4); }
}
.heart-svg { width: 46px; height: 46px; animation: beat 1.1s ease-in-out infinite; }
@keyframes beat {
  0%, 100% { transform: scale(1); }
  15% { transform: scale(1.18); }
  30% { transform: scale(1); }
  45% { transform: scale(1.12); }
}

/* Pulse line */
.pulse-line {
  width: 200px; height: 36px; margin-bottom: 22px; opacity: 0.6;
  overflow: hidden; position: relative;
}
.pulse-line svg { animation: slide 2.4s linear infinite; }
@keyframes slide { from { transform: translateX(0); } to { transform: translateX(-200px); } }

.title { color: #ffffff; font-size: 1.55rem; font-weight: 700; letter-spacing: 0.02em; z-index: 1; }
.subtitle { color: rgba(255,255,255,0.55); font-size: 0.82rem; margin-top: 6px; z-index: 1; }

/* Progress bar */
.progress-wrap {
  width: 180px; height: 3px; background: rgba(255,255,255,0.1);
  border-radius: 3px; margin-top: 28px; overflow: hidden; z-index: 1;
}
.progress-bar {
  height: 100%; width: 0; border-radius: 3px;
  background: linear-gradient(90deg, #2d8cf0, #19c37d);
  animation: load 2.6s ease-in-out forwards;
}
@keyframes load { to { width: 100%; } }
.loading-text {
  color: rgba(255,255,255,0.4); font-size: 0.7rem; margin-top: 8px;
  letter-spacing: 0.08em; z-index: 1;
}
</style>
</head>
<body>
<div class="splash">
  <div class="icon-wrap">
    <div class="heart-ring">
      <img src="assets/icon.png" style="width:56px;height:56px;border-radius:12px;" alt="BP Monitor">
    </div>
  </div>

  <div class="pulse-line">
    <svg width="400" height="36" viewBox="0 0 400 36">
      <polyline points="0,18 30,18 40,18 50,4 60,32 70,14 80,22 90,18 120,18
                         150,18 160,18 170,4 180,32 190,14 200,22 210,18 240,18
                         270,18 280,18 290,4 300,32 310,14 320,22 330,18 360,18 400,18"
                fill="none" stroke="rgba(45,200,140,0.5)" stroke-width="1.5"/>
    </svg>
  </div>

  <div class="title">BP Profile Monitor</div>
  <div class="subtitle">Sleep-Aware Blood Pressure Analysis</div>

  <div class="progress-wrap"><div class="progress-bar"></div></div>
  <div class="loading-text">LOADING</div>
</div>
</body>
</html>
