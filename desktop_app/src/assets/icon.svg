<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e7a9f;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0f2439" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#heartGrad)" filter="url(#shadow)"/>
  <!-- Heart -->
  <path d="M256 420 
           C256 420 100 310 100 200 
           C100 150 140 110 190 110 
           C220 110 245 130 256 155 
           C267 130 292 110 322 110 
           C372 110 412 150 412 200 
           C412 310 256 420 256 420Z" 
        fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <!-- ECG pulse line -->
  <polyline points="100,265 180,265 200,265 220,220 245,330 265,230 285,280 300,265 340,265 412,265"
            fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small heartbeat dots -->
  <circle cx="220" cy="220" r="5" fill="white" opacity="0.8"/>
  <circle cx="265" cy="230" r="5" fill="white" opacity="0.8"/>
</svg>
